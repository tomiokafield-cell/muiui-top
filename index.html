<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>一般社団法人むいうい</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
      background: #fff;
      color: #333;
      min-height: 100vh;
    }
    .site {
      max-width: 720px;
      margin: 0 auto;
      padding: 4rem 2rem;
    }
    .logo-wrap {
      text-align: center;
      margin-bottom: 3rem;
      padding-bottom: 2.5rem;
      border-bottom: 0.5px solid #ddd;
    }
    .logo-wrap img {
      width: 260px;
      max-width: 80%;
    }
    .page-title {
      font-size: 22px;
      font-weight: 500;
      color: #333;
      margin-bottom: 2rem;
      letter-spacing: 0.02em;
    }
    .info-table {
      width: 100%;
      border-collapse: collapse;
    }
    .info-table tr {
      border-bottom: 0.5px solid #ddd;
    }
    .info-table tr:first-child {
      border-top: 0.5px solid #ddd;
    }
    .info-table td {
      padding: 1.1rem 0;
      vertical-align: top;
      font-size: 15px;
      line-height: 1.8;
    }
    .info-table td:first-child {
      color: #5a8a6a;
      width: 130px;
      font-size: 14px;
      padding-right: 1.5rem;
      white-space: nowrap;
    }
    .info-table td:last-child {
      color: #333;
    }
    footer {
      margin-top: 4rem;
      text-align: center;
      font-size: 12px;
      color: #aaa;
    }
  </style>
</head>
<body>
  <div class="site">
    <div class="logo-wrap">
      <img src="muiui-logo.png" alt="一般社団法人むいうい ロゴ">
    </div>

    <p class="page-title">Corporate Information</p>

    <table class="info-table">
      <tr>
        <td>法人名</td>
        <td>一般社団法人むいうい</td>
      </tr>
      <tr>
        <td>設立</td>
        <td>2026年7月1日（予定）</td>
      </tr>
      <tr>
        <td>代表理事</td>
        <td>○○ ○○</td>
      </tr>
      <tr>
        <td>理事</td>
        <td>○○ ○○</td>
      </tr>
      <tr>
        <td>監査</td>
        <td>○○ ○○</td>
      </tr>
      <tr>
        <td>営業時間</td>
        <td>平日 9:00〜18:00（仮）</td>
      </tr>
      <tr>
        <td>お問い合わせ</td>
        <td><a href="mailto:info@ui-mui.com" style="color:#5a8a6a;">info@ui-mui.com（仮）</a></td>
      </tr>
    </table>

    <footer>
      <p>© 2026 一般社団法人むいうい</p>
    </footer>
  </div>
</body>
</html>
